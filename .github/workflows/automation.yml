# ==========================================
# FIELD JOBS - AUTOMATED WORKFLOWS
# ==========================================

name: Field Jobs Automation

# One scheduled run = one cron firing. Only the job whose `if` matches that cron runs;
# the other jobs show as "Skipped" — e.g. */6 runs only job-aggregator, not email-outreach.

on:
  schedule:
    # Job Aggregator: Runs every 6 hours
    - cron: '0 */6 * * *'
    # Lead Generator: Runs every Monday at 8 AM EST
    - cron: '0 13 * * 1'
    # Email Outreach: Runs 3x daily (9am, 1pm, 5pm EST)
    - cron: '0 14,18,22 * * *'
    # Lead Gen Health Check: Tuesdays 9 AM EST (day after lead generator)
    - cron: '0 14 * * 2'
  
  # Allow manual triggers
  workflow_dispatch:
    inputs:
      script:
        description: 'Script to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - job-aggregator
          - lead-generator
          - email-outreach
          - job-seeker-digest
          - lead-gen-health
      digest_limit:
        description: 'Job seeker digest — max recipients (only for job-seeker-digest)'
        required: false
        default: '50'
      digest_mode:
        description: 'Job seeker digest — dry-run logs only; send delivers mail'
        required: false
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - send

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
  SNOV_CLIENT_ID: ${{ secrets.SNOV_CLIENT_ID }}
  SNOV_CLIENT_SECRET: ${{ secrets.SNOV_CLIENT_SECRET }}
  SKRAPP_API_KEY: ${{ secrets.SKRAPP_API_KEY }}
  HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
  ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
  ADZUNA_API_KEY: ${{ secrets.ADZUNA_API_KEY }}
  JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}

permissions:
  contents: read
  issues: write

jobs:
  # ==========================================
  # JOB AGGREGATOR
  # ==========================================
  job-aggregator:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 */6 * * *' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.script == 'all' || github.event.inputs.script == 'job-aggregator')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run Job Aggregator
        run: node scripts/job-aggregator.js
      
      - name: Report results
        if: always()
        run: echo "Job aggregator completed"

  # ==========================================
  # LEAD GENERATOR
  # ==========================================
  lead-generator:
    runs-on: ubuntu-latest
    # Match cron loosely — strict == was skipping this job (same fix as email-outreach).
    if: |
      github.event_name == 'schedule' && contains(github.event.schedule, '13 * * 1') ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.script == 'all' || github.event.inputs.script == 'lead-generator')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug schedule context
        if: github.event_name == 'schedule'
        run: 'echo "github.event.schedule=${{ github.event.schedule }}"'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run Lead Generator
        run: node scripts/lead-generator.js

      - name: Verify lead generator yield
        if: github.event_name == 'schedule'
        run: node scripts/lead-gen-health.js --check-last-run --strict
      
      - name: Open issue on zero-yield lead gen
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Lead generator saved 0 leads on scheduled run';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'lead-gen',
            });
            if (issues.some(i => i.title === title)) {
              core.info('Open lead-gen issue already exists — skipping duplicate');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['lead-gen', 'automation'],
              body: [
                'The scheduled **lead-generator** run completed but saved no new leads.',
                '',
                `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                '**Common causes:**',
                '- Hunter (25/mo) and Snov (50/mo) quotas exhausted — check `email_service_usage` in Supabase',
                '- Snov not configured in GitHub secrets (`SNOV_CLIENT_ID`, `SNOV_CLIENT_SECRET`)',
                '- All Claude suggestions were duplicate domains',
                '- Email verification failures',
                '',
                '**Next steps:**',
                '1. Run `SELECT * FROM automation_runs WHERE script_name = \'lead-generator\' ORDER BY started_at DESC LIMIT 5` in Supabase',
                '2. Check GitHub Actions logs for this run',
                '3. Manually trigger lead-generator from Actions if quotas have reset',
              ].join('\n'),
            });
      
      - name: Report results
        if: always()
        run: echo "Lead generator completed"

  # ==========================================
  # EMAIL OUTREACH
  # ==========================================
  email-outreach:
    runs-on: ubuntu-latest
    # Match outreach cron even if GitHub's schedule string varies slightly (strict == was skipping the job).
    if: |
      github.event_name == 'schedule' && contains(github.event.schedule, '14,18,22') ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.script == 'all' || github.event.inputs.script == 'email-outreach')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug schedule context
        if: github.event_name == 'schedule'
        run: 'echo "github.event.schedule=${{ github.event.schedule }}"'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run Email Outreach
        run: node scripts/email-outreach.js
      
      - name: Report results
        if: always()
        run: echo "Email outreach completed"

  # ==========================================
  # JOB SEEKER DIGEST (manual only — pilot; use dry-run first)
  # ==========================================
  job-seeker-digest:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'job-seeker-digest'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run job seeker digest
        run: |
          if [ "${{ github.event.inputs.digest_mode }}" = "send" ]; then
            node scripts/job-seeker-digest.js --send --limit=${{ github.event.inputs.digest_limit }}
          else
            node scripts/job-seeker-digest.js --dry-run --limit=${{ github.event.inputs.digest_limit }}
          fi

      - name: Report results
        if: always()
        run: echo "Job seeker digest step finished"

  # ==========================================
  # LEAD GEN HEALTH CHECK
  # ==========================================
  lead-gen-health:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' && contains(github.event.schedule, '14 * * 2') ||
      github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'lead-gen-health'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run weekly lead gen health check
        run: node scripts/lead-gen-health.js --weekly --strict

      - name: Open issue on unhealthy pipeline
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Lead gen pipeline health check failed';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'lead-gen',
            });
            if (issues.some(i => i.title === title)) {
              core.info('Open health-check issue already exists — skipping duplicate');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['lead-gen', 'automation'],
              body: [
                'The weekly **lead-gen-health** check detected problems.',
                '',
                `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                'Review the job logs and Supabase tables `automation_runs`, `email_service_usage`, and `leads`.',
              ].join('\n'),
            });

